task_plot_spec:
  spec_version: '0.2'
  meta:
    task_name: Stop-Signal Task (SST-Audio)
    mode: existing
    task_id: T000013
  figure:
    output:
      filename: task_flow.png
      dpi: 300
      width_in: 16.0
      background: white
    layout:
      max_conditions: 4
      screens_per_timeline: 4
      screen_overlap_ratio: 0.1
      screen_slope: 0.08
      screen_slope_deg: 25.0
      timeline_gap: 0.18
      screen_aspect_ratio: 1.4545454545454546
      left_margin: 0.2
      right_margin: 0.03
      top_margin: 0.03
      bottom_margin: 0.05
      condition_label_gap: 0.014
      phase_label_pad: 0.01
      duration_label_gap: 0.006
      timeline_arrow_gap: 0.01
      timeline_arrow_screen_clearance: 0.007
      timeline_arrow_text_clearance: 0.01
      timeline_arrow_extra_per_screen: 0.015
      timeline_arrow_min_y: 0.02
      timeline_arrow_max_y: 0.96
  timelines:
  - condition: go_left
    display_condition_label: Go Left
    phases:
    - phase_name: fixation
      display_phase_label: Fixation
      duration_ms:
        range:
        - 800
        - 1000
      response_window_ms: null
      display_timing_label: 800-1000 ms
      stim_ids:
      - fixation
      stimulus_example:
        summary: +
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: +
          color: white
          pos: null
          height: null
      notes: ''
    - phase_name: go_response_window
      display_phase_label: Go Response
      duration_ms:
        fixed: 1000
      response_window_ms:
        fixed: 1000
      display_timing_label: 1000 ms
      stim_ids:
      - go_left
      stimulus_example:
        summary: Left Arrow
        modality: visual
        draw_hint: shape
        render_items:
        - shape: arrow_left
          label: Left Arrow
          kind: shape
          color: white
          pos: null
          size: 8.0
      notes: cond_kind==go
    - phase_name: no_response_feedback
      display_phase_label: Miss Feedback
      duration_ms:
        fixed: 800
      response_window_ms: null
      display_timing_label: 800 ms
      stim_ids:
      - no_response_feedback
      stimulus_example:
        summary: No Response Feedback
        modality: visual
        draw_hint: image_ref
        render_items:
        - kind: image_ref
          path: E:\xhmhc\TaskBeacon\benchmark\runs\task_plot_redo\T000013-sst-audio\references\no_response_feedback_text.png
          label: No Response Feedback
      notes: only on go timeout
