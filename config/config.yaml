# ============================================================================
# Base config (human run)
# - Used by: python main.py
# - Scope: human experiment only (no qa/sim section in this file)
# ============================================================================

# === Subject Form ===========================================================
subinfo_fields:
  - name: subject_id
    type: int
    constraints:
      min: 101
      max: 999
      digits: 3
  - name: subname
    type: string
  - name: age
    type: int
    constraints:
      min: 5
      max: 60
  - name: gender
    type: choice
    choices:
      - Male
      - Female

# === Subject Mapping ========================================================
subinfo_mapping:
  subject_id: 被试号
  subname: 被试姓名(拼音)
  age: 年龄
  gender: 性别
  Male: 男
  Female: 女
  registration_failed: 注册失败。
  registration_successful: 注册成功！
  invalid_input: 字段 {field} 输入无效

# === Display / Window =======================================================
window:
  size:
    - 1920
    - 1080
  units: deg
  screen: 1
  bg_color: gray
  fullscreen: true
  monitor_width_cm: 60
  monitor_distance_cm: 72

# === Task ===================================================================
task:
  task_name: eeg_sst_audio
  language: Chinese
  voice_name: zh-CN-YunyangNeural
  voice_enabled: true
  total_blocks: 3
  total_trials: 210
  trial_per_block: 70
  delta: 0.05
  conditions:
    - go_left
    - go_right
    - stop_left
    - stop_right
  key_list:
    - f
    - j
  left_key: f
  right_key: j
  seed_mode: same_across_sub

# === Stimuli ================================================================
stimuli:
  fixation:
    type: text
    text: "+"
    color: white

  go_left:
    type: shape
    vertices:
      - [0.2, 0.05]
      - [0.2, -0.05]
      - [0.0, -0.05]
      - [0.0, -0.1]
      - [-0.2, 0.0]
      - [0.0, 0.1]
      - [0.0, 0.05]
    fillColor: white
    size: 8
    lineColor: ""

  go_right:
    type: shape
    vertices:
      - [-0.2, 0.05]
      - [-0.2, -0.05]
      - [0.0, -0.05]
      - [0.0, -0.1]
      - [0.2, 0.0]
      - [0.0, 0.1]
      - [0.0, 0.05]
    fillColor: white
    size: 8
    lineColor: ""

  stop_signal:
    type: sound
    file: assets/beep.mp3

  no_response_feedback:
    type: text
    text: |
      【未按键】
      请在箭头出现后按键。
    color: white
    font: SimHei
    height: 0.78

  block_break:
    type: text
    text: |
      【休息提示】

      第 {block_num} / {total_blocks} 部分完成。
      击中率：{go_accuracy:.2f}
      正确停止率：{stop_accuracy:.2f}

      请在充分休息后按【空格键】
      进入下一部分。
    color: white
    font: SimHei
    height: 0.78

  instruction_text:
    type: textbox
    text: |
      【停止信号任务说明】

      在本任务中，您将看到箭头指向左或右。
      请尽快且准确地做出反应：
      - 箭头向左时按【F】
      - 箭头向右时按【J】

      在部分试次中，您会听到短促的“哔”声。
      当听到“哔”声时，请尽量抑制反应，不要按键。

      准备好后，请按【空格键】开始任务。
    color: white
    font: SimHei
    alignment: center
    letterHeight: 0.78
    units: deg
    size: [20, 5]

  good_bye:
    type: textbox
    text: |
      任务结束。

      感谢您的参与。
      请按【空格键】退出。
    color: white
    font: SimHei
    alignment: center
    letterHeight: 0.78
    units: deg
    size: [20, 5]

# === Timing =================================================================
timing:
  fixation_duration: [0.8, 1.0]
  go_duration: 1.0
  no_response_feedback_duration: 0.8

# === Triggers ===============================================================
triggers:
  map:
    exp_onset: 98
    exp_end: 99
    block_onset: 100
    block_end: 101
    fixation_onset: 1
    go_onset: 10
    go_response: 11
    go_miss: 12
    stop_onset: 22
    pre_stop_response: 23
    on_stop_response: 24
    no_response_feedback_onset: 30

  driver:
    type: serial_url
    url: loop://
    baudrate: 115200
    timeout: 1
    prefix:
      - 1
      - 225
      - 1
      - 0

  policy:
    strict: false

  timing:
    post_delay_s: 0.001

# === Adaptive Controller (optional) =========================================
controller:
  initial_ssd: 0.25
  step: 0.05
  min_ssd: 0.05
  max_ssd: 0.5
  target_success: 0.5
