# ============================================================================
# Sampler simulation config
# - Used by: python main.py sim --config config/config_sampler_sim.yaml
# - Scope: sampler simulation only (no qa section in this file)
# - Profile: short smoke run for sampler integration checks
# ============================================================================

# === Subject Form ===========================================================
subinfo_fields:
  - name: subject_id
    type: int
    constraints:
      min: 101
      max: 999
      digits: 3
  - name: subname
    type: string
  - name: age
    type: int
    constraints:
      min: 5
      max: 60
  - name: gender
    type: choice
    choices:
      - Male
      - Female

# === Subject Mapping ========================================================
subinfo_mapping:
  subject_id: 被试号
  subname: 被试姓名(拼音)
  age: 年龄
  gender: 性别
  Male: 男
  Female: 女
  registration_failed: 注册失败。
  registration_successful: 注册成功！
  invalid_input: 字段 {field} 输入无效

# === Display / Window =======================================================
window:
  size:
    - 1920
    - 1080
  units: deg
  screen: 1
  bg_color: gray
  fullscreen: true
  monitor_width_cm: 60
  monitor_distance_cm: 72

# === Task ===================================================================
task:
  task_name: eeg_sst_audio
  language: Chinese
  voice_name: zh-CN-YunyangNeural
  voice_enabled: false
  total_blocks: 1
  total_trials: 24
  trial_per_block: 24
  delta: 0.05
  conditions:
    - go_left
    - go_right
    - stop_left
    - stop_right
  key_list:
    - f
    - j
  left_key: f
  right_key: j
  seed_mode: same_across_sub

# === Stimuli ================================================================
stimuli:
  fixation:
    type: text
    text: "+"
    color: white

  go_left:
    type: shape
    vertices:
      - [0.2, 0.05]
      - [0.2, -0.05]
      - [0.0, -0.05]
      - [0.0, -0.1]
      - [-0.2, 0.0]
      - [0.0, 0.1]
      - [0.0, 0.05]
    fillColor: white
    size: 8
    lineColor: ""

  go_right:
    type: shape
    vertices:
      - [-0.2, 0.05]
      - [-0.2, -0.05]
      - [0.0, -0.05]
      - [0.0, -0.1]
      - [0.2, 0.0]
      - [0.0, 0.1]
      - [0.0, 0.05]
    fillColor: white
    size: 8
    lineColor: ""

  stop_signal:
    type: sound
    file: assets/beep.mp3

  no_response_feedback:
    type: text
    text: |
      【未按键】
      请在箭头出现后按键。
    color: white
    font: SimHei
    height: 0.78

  block_break:
    type: text
    text: |
      Sampler Sim：第 {block_num} / {total_blocks} 部分完成
      击中率：{go_accuracy:.2f}
      正确停止率：{stop_accuracy:.2f}
      请按【空格键】继续。
    color: white
    font: SimHei
    height: 0.78

  instruction_text:
    type: textbox
    text: |
      【停止信号任务（听觉版）】

      Sampler Sim 模式：
      箭头向左按【F】，向右按【J】。
      听到“哔”声时请停止按键。

      请按【空格键】开始。
    color: white
    font: SimHei
    alignment: center
    letterHeight: 0.78
    units: deg
    size: [20, 5]

  good_bye:
    type: textbox
    text: |
      Sampler Sim 结束。
      请按【空格键】退出。
    color: white
    font: SimHei
    alignment: center
    letterHeight: 0.78
    units: deg
    size: [20, 5]

# === Timing =================================================================
timing:
  fixation_duration: [0.8, 1.0]
  go_duration: 1.0
  no_response_feedback_duration: 0.8

# === Triggers ===============================================================
triggers:
  map:
    exp_onset: 98
    exp_end: 99
    block_onset: 100
    block_end: 101
    fixation_onset: 1
    go_onset: 10
    go_response: 11
    go_miss: 12
    stop_onset: 22
    pre_stop_response: 23
    on_stop_response: 24
    no_response_feedback_onset: 30

  driver:
    type: serial_url
    url: loop://
    baudrate: 115200
    timeout: 1
    prefix:
      - 1
      - 225
      - 1
      - 0

  policy:
    strict: false

  timing:
    post_delay_s: 0.001

# === Adaptive Controller (optional) =========================================
controller:
  initial_ssd: 0.25
  step: 0.05
  min_ssd: 0.05
  max_ssd: 0.5
  target_success: 0.5

# === Simulation Runtime =====================================================
sim:
  output_dir: outputs/sim_sampler
  seed: 0
  participant_id: sim001
  session_id: sub-sim001_task-eeg_sst_audio_sampler_seed0
  log_path: outputs/sim_sampler/sub-sim001_task-eeg_sst_audio_sampler_seed0_sim_events.jsonl
  policy: warn
  default_rt_s: 0.2
  clamp_rt: false
  responder:
    type: responders.task_sampler:TaskSamplerResponder
    kwargs:
      key_left: f
      key_right: j
      p_hit_go: 0.90
      p_fail_stop: 0.50
      rt_go_mean_s: 0.32
      rt_go_sd_s: 0.05
      rt_min_s: 0.12
      continue_rt_s: 0.25
